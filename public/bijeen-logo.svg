<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" width="280" height="80">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@1,800&amp;display=swap');
    </style>
  </defs>

  <!-- Icon: twee verbonden cirkels (mensen/verbinding) -->
  <g transform="translate(12, 12)">
    <!-- Linker cirkel -->
    <circle cx="18" cy="22" r="10" fill="none" stroke="#C8522A" stroke-width="3.5"/>
    <!-- Rechter cirkel -->
    <circle cx="38" cy="22" r="10" fill="none" stroke="#C8522A" stroke-width="3.5"/>
    <!-- Verbindingslijn onderaan -->
    <path d="M8 44 Q28 36 48 44" fill="none" stroke="#C8522A" stroke-width="3" stroke-linecap="round"/>
    <!-- Verbindingspunt midden -->
    <circle cx="28" cy="22" r="3.5" fill="#C8522A"/>
  </g>

  <!-- Woordmark -->
  <text
    x="76"
    y="54"
    font-family="Fraunces, Georgia, serif"
    font-weight="800"
    font-style="italic"
    font-size="46"
    fill="#1C1814"
    letter-spacing="-1"
  >Bijeen</text>

  <!-- Subtiele tagline -->
  <text
    x="78"
    y="70"
    font-family="system-ui, sans-serif"
    font-weight="500"
    font-size="11"
    fill="#C8522A"
    letter-spacing="2.5"
  >EVENEMENTENPLATFORM</text>
</svg>
